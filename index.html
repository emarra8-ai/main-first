<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#000000" />

    <!-- ============================================================= -->
    <!-- ✏️  SEO — EDIT THE TEXT INSIDE THESE TAGS                      -->
    <!-- ============================================================= -->
    <title>Emiliano Marra — Operations Executive, Inventor &amp; Engineer</title>
    <meta
      name="description"
      content="Emiliano Marra is a C-level operations executive, inventor, and engineer — co-founder & VP of Marra Forni, founder of No.1 Grills, and holder of U.S. Patent 9,980,606 for a multipurpose cooking appliance."
    />
    <meta name="author" content="Emiliano Marra" />
    <meta name="keywords" content="Emiliano Marra, operations executive, inventor, engineer, multipurpose cooking appliance, patent 9980606, Marra Forni, No.1 Grills, brick ovens, cooking equipment, Washington DC" />

    <!-- Canonical URL — ✏️ set this to your final deployed URL -->
    <link rel="canonical" href="https://example.com/" />

    <!-- ============================================================= -->
    <!-- ✏️  OPEN GRAPH / SOCIAL SHARE PREVIEW                          -->
    <!-- After deploying, replace og:url and og:image with ABSOLUTE     -->
    <!-- URLs (e.g. https://your-site.com/assets/og-image.png).         -->
    <!-- Social networks require a full https:// image URL to show it.  -->
    <!-- ============================================================= -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Emiliano Marra — Operations Executive, Inventor & Engineer" />
    <meta property="og:description" content="Operations executive, inventor & engineer. Co-founder of Marra Forni, founder of No.1 Grills, and holder of U.S. Patent 9,980,606 for a multipurpose cooking appliance." />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:image" content="https://example.com/assets/og-image.png" />
    <meta property="og:site_name" content="Emiliano Marra" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Emiliano Marra — Operations Executive, Inventor & Engineer" />
    <meta name="twitter:description" content="Operations executive, inventor & engineer. Co-founder of Marra Forni, founder of No.1 Grills, and U.S. patent holder for a multipurpose cooking appliance." />
    <meta name="twitter:image" content="https://example.com/assets/og-image.png" />

    <!-- Fonts: Inter (body/UI, per hero spec) + Fraunces (editorial serif headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
