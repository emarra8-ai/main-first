<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#8E2A24" />

    <!-- ============================================================= -->
    <!-- ✏️  SEO — EDIT THE TEXT INSIDE THESE TAGS                      -->
    <!-- ============================================================= -->
    <title>Emiliano Marra — Restaurant Equipment Specialist &amp; Consultant</title>
    <meta
      name="description"
      content="Emiliano Marra helps Washington, D.C. restaurants choose, demo, and buy the right professional Italian kitchen equipment — from pizza ovens to mixers and pasta tools."
    />
    <meta name="author" content="Emiliano Marra" />
    <meta name="keywords" content="Italian kitchen equipment, pizza ovens, restaurant consulting, Washington DC, Italiana FoodTech, Emiliano Marra" />

    <!-- Canonical URL — ✏️ set this to your final deployed URL -->
    <link rel="canonical" href="https://example.com/" />

    <!-- ============================================================= -->
    <!-- ✏️  OPEN GRAPH / SOCIAL SHARE PREVIEW                          -->
    <!-- After deploying, replace og:url and og:image with ABSOLUTE     -->
    <!-- URLs (e.g. https://your-site.com/assets/og-image.png).         -->
    <!-- Social networks require a full https:// image URL to show it.  -->
    <!-- ============================================================= -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Emiliano Marra — Restaurant Equipment Specialist & Consultant" />
    <meta property="og:description" content="20+ years matching D.C. restaurants with the right professional Italian kitchen equipment. Try before you buy." />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:image" content="https://example.com/assets/og-image.png" />
    <meta property="og:site_name" content="Emiliano Marra" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Emiliano Marra — Restaurant Equipment Specialist & Consultant" />
    <meta name="twitter:description" content="20+ years matching D.C. restaurants with the right professional Italian kitchen equipment. Try before you buy." />
    <meta name="twitter:image" content="https://example.com/assets/og-image.png" />

    <!-- Fonts: Inter (body/UI, per hero spec) + Fraunces (editorial serif headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..600&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
